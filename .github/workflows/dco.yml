name: dco

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check DCO sign-off on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Re-fetch in case the action context didn't include the base commit
          git fetch --quiet origin "$BASE_SHA" || true

          missing=0
          while IFS= read -r sha; do
            [ -z "$sha" ] && continue
            author_name=$(git show -s --format=%an "$sha")
            author_email=$(git show -s --format=%ae "$sha")
            expected="Signed-off-by: ${author_name} <${author_email}>"
            if ! git show -s --format=%B "$sha" | grep -qiF "$expected"; then
              echo "::error::commit $sha is missing '${expected}'"
              missing=1
            fi
          done < <(git log --no-merges --format=%H "$BASE_SHA..$HEAD_SHA")

          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Fix by amending each commit with 'git commit --amend -s' and force-pushing,"
            echo "or by adding a Signed-off-by trailer to new commits."
            exit 1
          fi
