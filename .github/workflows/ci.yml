name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build & test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.23.x']
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify module tidiness
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum || { \
            echo "go.mod / go.sum out of date — run 'go mod tidy'"; exit 1; }

      - name: gofmt
        run: |
          fmt_out=$(gofmt -l -s .)
          if [ -n "$fmt_out" ]; then
            echo "gofmt issues in:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -trimpath -o bin/soyaos ./cmd/soyaos
